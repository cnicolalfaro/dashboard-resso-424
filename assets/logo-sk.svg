  <text x="100" y="118" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="78" fill="#1f3c74" letter-spacing="-4">SK</text>
  <!-- Red triangles -->
  <polygon points="56,150 76,150 66,166" fill="#e1251b"/>
  <polygon points="124,150 144,150 134,166" fill="#e1251b"/>
